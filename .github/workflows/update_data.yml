name: Atualizar dados BPP

on:
  schedule:
    - cron: '0 9 * * *'   # Todo dia às 06:00 BRT (09:00 UTC)
  workflow_dispatch:        # Permite rodar manualmente

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Autenticar no Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Instalar bq CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Exportar dados do BigQuery
        run: bash scripts/export_data.sh

      - name: Commit e push dos dados atualizados
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add js/data/layer1.js js/data/layer2.js
          git diff --cached --quiet || git commit -m "chore: atualização diária dos dados $(date +'%Y-%m-%d')"
          git push
